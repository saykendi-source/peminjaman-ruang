<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruang Kosong TI UMY</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --bg: #e8e6f0;
      --bg2: #dddaf0;
      --card-bg: rgba(255,255,255,0.72);
      --card-border: rgba(255,255,255,0.90);
      --purple-dark: #2d2a6e;
      --purple-mid: #5b58c0;
      --purple-light: #a89ff5;
      --purple-pale: #c8c4f8;
      --text-dark: #2d2a6e;
      --text-mid: #6b68a8;
      --text-light: #9896c8;
      --accent-cyan: #7ee8f8;
      --accent-violet: #a97ff5;
      --shadow: 0 8px 32px rgba(90,80,180,0.10);
      --shadow-card: 0 4px 18px rgba(90,80,180,0.10);
      --radius: 22px;
      --radius-sm: 16px;
      --radius-xs: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', "Segoe UI", sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      background: linear-gradient(160deg, #dbd8f2 0%, #e4e2f5 40%, #ede8f8 70%, #e0dcf4 100%);
      background-attachment: fixed;
    }

    /* ─── TOPBAR HIDDEN (replaced by header card) ─── */
    .topbar { display: none; }

    /* ─── CONTAINER ─── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 18px 40px;
    }

    /* ─── HEADER ─── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .app-header-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, #b8aff5 0%, #a097f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(130,110,240,0.30);
      flex-shrink: 0;
    }

    .app-header-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .app-header-text h1 {
      font-size: 22px;
      font-weight: 900;
      color: var(--purple-dark);
      line-height: 1.2;
    }

    .app-header-text p {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 600;
      margin-top: 2px;
    }

    /* ─── MAIN CARD ─── */
    .main-card {
      background: rgba(255,255,255,0.68);
      border-radius: 28px;
      border: 1.5px solid rgba(255,255,255,0.90);
      box-shadow: 0 12px 48px rgba(100,90,200,0.13);
      padding: 22px 20px;
      backdrop-filter: blur(20px);
      margin-bottom: 20px;
    }

    /* ─── FIELD LABELS ─── */
    .field-label {
      font-size: 14px;
      font-weight: 800;
      color: var(--purple-dark);
      margin-bottom: 8px;
      display: block;
    }

    .field {
      margin-bottom: 16px;
    }

    .field.hidden { display: none; }

    /* ─── SELECT WRAPPER (with icon) ─── */
    .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .select-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--purple-light);
      pointer-events: none;
      z-index: 1;
    }

    .select-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .glass-select {
      width: 100%;
      height: 52px;
      border: 1.5px solid rgba(200,196,248,0.60);
      border-radius: 16px;
      padding: 0 42px 0 46px;
      background: rgba(255,255,255,0.80);
      color: var(--text-mid);
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      outline: none;
      box-shadow: 0 2px 12px rgba(130,110,240,0.07);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .glass-select:focus {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 4px rgba(168,159,245,0.18);
    }

    .chevron-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--purple-light);
      pointer-events: none;
    }

    .chevron-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ─── BUTTON ROW ─── */
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    .glass-btn {
      flex: 1;
      height: 50px;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .glass-btn:active { transform: scale(0.97); }

    .glass-btn.primary {
      background: linear-gradient(90deg, #8fd7f8 0%, #aec6fd 50%, #c4b5fd 100%);
      color: #2d2a6e;
      box-shadow: 0 6px 20px rgba(140,200,255,0.40);
    }

    .glass-btn.secondary {
      background: rgba(255,255,255,0.70);
      border: 1.5px solid rgba(200,196,248,0.70);
      color: var(--purple-mid);
      box-shadow: 0 4px 14px rgba(130,110,240,0.08);
    }

    .glass-btn.tertiary {
      background: linear-gradient(90deg, #c4b5fd 0%, #b8aff5 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(160,140,255,0.35);
    }

    .glass-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ─── STATUS BADGE ─── */
    .status-badge, .mode-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(200,196,248,0.35);
      color: var(--purple-mid);
      border: 1px solid rgba(200,196,248,0.50);
    }

    /* ─── CALENDAR CARD ─── */
    .calendar-card {
      background: rgba(255,255,255,0.68);
      border-radius: 28px;
      border: 1.5px solid rgba(255,255,255,0.90);
      box-shadow: 0 8px 32px rgba(100,90,200,0.10);
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px);
    }

    .cal-header {
      font-size: 22px;
      font-weight: 900;
      color: var(--purple-dark);
      margin-bottom: 16px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-day-name {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      padding: 4px 0 8px;
      text-transform: lowercase;
    }

    .cal-day {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--purple-dark);
      padding: 7px 2px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .cal-day:hover { background: rgba(168,159,245,0.18); }

    .cal-day.today {
      background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
      color: white;
      box-shadow: 0 4px 12px rgba(130,110,240,0.30);
    }

    .cal-day.other-month {
      color: rgba(168,159,245,0.35);
    }

    /* ─── RESULT SECTION TITLE ─── */
    .result-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .result-section-header h2 {
      font-size: 16px;
      font-weight: 800;
      color: var(--purple-dark);
    }

    /* ─── RESULT GRID ─── */
    .result-scroll {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .result-item {
      background: rgba(255,255,255,0.75);
      border-radius: 18px;
      border: 1.5px solid rgba(255,255,255,0.90);
      box-shadow: 0 4px 16px rgba(100,90,200,0.09);
      padding: 14px 12px;
      position: relative;
      overflow: hidden;
    }

    .result-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--purple-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .result-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple-mid), var(--purple-light));
      color: white;
      margin-bottom: 6px;
    }

    .result-detail {
      font-size: 11.5px;
      color: var(--text-mid);
      line-height: 1.55;
      font-weight: 600;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 28px 20px;
      border-radius: 18px;
      color: var(--text-mid);
      background: rgba(255,255,255,0.50);
      font-size: 14px;
      font-weight: 600;
    }

    /* ─── HELPER NOTE ─── */
    .helper-note { display: none; }

    /* ─── LEGACY SECTIONS HIDDEN ─── */
    .glass-panel.hero,
    .guide-card,
    .footer { display: none; }

    /* ─── LAYOUT override: stack vertically ─── */
    .layout {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .search-card {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }

    .result-card {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      min-height: unset;
    }

    /* ─── SECTION TITLE inside search ─── */
    .section-title { display: none; }

    .loading { color: var(--purple-mid); font-weight: 700; }
    .error { color: #e05555; font-weight: 700; }

    /* ─── BG ORBS (subtle) ─── */
    .bg-orb { display: none; }
  </style>
</head>
<body>

  <div class="container">

    <!-- ─── HEADER ─── -->
    <div class="app-header">
      <div class="app-header-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9" fill="rgba(255,255,255,0.5)"/>
        </svg>
      </div>
      <div class="app-header-text">
        <h1>Ruang Kuliah</h1>
        <p>Ketersediaan Ruang Perkuliahan</p>
      </div>
    </div>

    <!-- ─── SEARCH CARD ─── -->
    <div class="main-card">
      <!-- Mode Pencarian -->
      <div class="field">
        <span class="field-label">Mode Pencarian</span>
        <div class="select-wrap">
          <span class="select-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <select id="mode" class="glass-select">
            <option value="" disabled selected>Pilih mode pencarian...</option>
            <option value="hari-ruang">Berdasarkan hari dan ruang</option>
            <option value="hari-jam">Berdasarkan hari dan jam</option>
          </select>
          <span class="chevron-icon">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <!-- Hari -->
      <div class="field">
        <span class="field-label">Hari</span>
        <div class="select-wrap">
          <span class="select-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
          <select id="hari" class="glass-select">
            <option value="" disabled selected>Pilih hari...</option>
          </select>
          <span class="chevron-icon">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <!-- Ruang -->
      <div class="field" id="fieldRuang">
        <span class="field-label">Ruang</span>
        <div class="select-wrap">
          <span class="select-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
          </span>
          <select id="ruang" class="glass-select">
            <option value="" disabled selected>Pilih ruang...</option>
          </select>
          <span class="chevron-icon">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <!-- Jam (hidden by default) -->
      <div class="field hidden" id="fieldJam">
        <span class="field-label">Jam</span>
        <div class="select-wrap">
          <span class="select-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <select id="jam" class="glass-select">
            <option value="" disabled selected>Pilih jam...</option>
          </select>
          <span class="chevron-icon">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="button-row">
        <button class="glass-btn primary" id="btnCek">
          <svg fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Tampilkan Hasil
        </button>
        <button class="glass-btn tertiary" id="btnRefresh">
          <svg fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          Perbarui Data
        </button>
      </div>

      <!-- hidden status for JS -->
      <div id="status" style="display:none"></div>
      <div id="modeBadge" style="display:none"></div>
    </div>

    <!-- ─── CALENDAR CARD ─── -->
    <div class="calendar-card" id="calendarCard">
      <div class="cal-header" id="calMonthTitle"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- ─── RESULTS ─── -->
    <div class="result-section-header">
      <h2 id="resultTitle">Ruangan Tersedia</h2>
      <div id="resultStatusBadge" class="status-badge">—</div>
    </div>
    <div id="resultList" class="result-scroll"></div>

    <!-- legacy hidden elements for JS compatibility -->
    <div class="layout" style="display:none">
      <section class="search-card" style="display:none"></section>
      <section class="result-card" style="display:none">
        <div class="section-title"><div><h2 id="resultTitleHidden"></h2><p id="resultDesc"></p></div></div>
      </section>
    </div>
    <button id="btnNow" style="display:none"></button>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRypj3EmC8FLDdKZh4uTrqltL8tqlW01tmnnUVlBaErlNJxFPXVvxwC5zcwa1eCZw/pub?output=csv';

    const DAYS = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const TIME_SLOTS = [
      '07.00 - 07.50','07.50 - 08.40','08.50 - 09.40','09.40 - 10.30',
      '10.40 - 11.30','12.10 - 13.10','13.20 - 14.10','14.10 - 15.00',
      '15.30 - 16.20','16.20 - 17.10','17.10 - 18.00','18.30 - 19.20',
      '19.20 - 20.10','20.10 - 21.00'
    ];

    const ROOMS = [
      'RKBesar/F6.001','F6.002','F6.003','F6.004','F6.101',
      'F6.102','F6.103','F6.202','F6.203','F4.001','F4.002','F4.003'
    ];

    const state = { rows: [], occupiedMap: new Map() };

    const els = {
      mode: document.getElementById('mode'),
      hari: document.getElementById('hari'),
      ruang: document.getElementById('ruang'),
      jam: document.getElementById('jam'),
      fieldRuang: document.getElementById('fieldRuang'),
      fieldJam: document.getElementById('fieldJam'),
      btnCek: document.getElementById('btnCek'),
      btnNow: document.getElementById('btnNow'),
      btnRefresh: document.getElementById('btnRefresh'),
      status: document.getElementById('status'),
      resultTitle: document.getElementById('resultTitle'),
      resultDesc: document.getElementById('resultDesc'),
      resultList: document.getElementById('resultList'),
      modeBadge: document.getElementById('modeBadge'),
      resultStatusBadge: document.getElementById('resultStatusBadge')
    };

    // ─── CALENDAR ───
    function renderCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dayNames = ['mo','tu','we','th','fr','su','sa'];

      document.getElementById('calMonthTitle').textContent = `${monthNames[month]} ${year}`;

      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      // day name headers
      dayNames.forEach(d => {
        const el = document.createElement('div');
        el.className = 'cal-day-name';
        el.textContent = d;
        grid.appendChild(el);
      });

      // first day of month (0=Sun..6=Sat), convert to Mon-first
      const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
      const startOffset = firstDay === 0 ? 6 : firstDay - 1; // Mon=0

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();
      const today = now.getDate();

      // prev month fill
      for (let i = startOffset - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className = 'cal-day other-month';
        el.textContent = daysInPrevMonth - i;
        grid.appendChild(el);
      }

      // current month
      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'cal-day' + (d === today ? ' today' : '');
        el.textContent = d;
        grid.appendChild(el);
      }

      // next month fill
      const totalCells = startOffset + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let d = 1; d <= remaining; d++) {
        const el = document.createElement('div');
        el.className = 'cal-day other-month';
        el.textContent = d;
        grid.appendChild(el);
      }
    }

    // ─── HELPERS ───
    function parseCSV(text) {
      const rows = [];
      let row = [], cell = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') { cell += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (char === ',' && !inQuotes) {
          row.push(cell); cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(cell);
          if (row.some(v => String(v).trim() !== '')) rows.push(row);
          row = []; cell = '';
        } else { cell += char; }
      }
      if (cell.length || row.length) {
        row.push(cell);
        if (row.some(v => String(v).trim() !== '')) rows.push(row);
      }
      return rows;
    }

    function normalizeText(v) { return String(v||'').replace(/–/g,'-').replace(/\s+/g,' ').trim(); }
    function normalizeDay(v) {
      const map = {senin:'Senin',selasa:'Selasa',rabu:'Rabu',kamis:'Kamis',jumat:'Jumat',sabtu:'Sabtu'};
      return map[normalizeText(v).toLowerCase()] || v;
    }
    function normalizeTime(v) { return normalizeText(v).replace(/\s*-\s*/g,' - '); }

    function buildRowsFromNormalizedSheet(rawRows) {
      const headers = rawRows[0].map(h => normalizeText(h).toLowerCase());
      const idxHari = headers.findIndex(h => h === 'hari');
      const idxJam = headers.findIndex(h => h === 'jam');
      const idxRuang = headers.findIndex(h => h === 'ruang');
      const idxMatkul = headers.findIndex(h => h.includes('mata kuliah') || h === 'jadwal');
      if (idxHari === -1 || idxJam === -1 || idxRuang === -1) return null;
      return rawRows.slice(1).map(row => ({
        hari: normalizeDay(row[idxHari]),
        jam: normalizeTime(row[idxJam]),
        ruang: normalizeText(row[idxRuang]),
        mataKuliah: normalizeText(row[idxMatkul])
      })).filter(item => item.hari && item.jam && item.ruang);
    }

    function buildRowsFromWideSheet(rawRows, selectedDay='Senin') {
      const headerRow = rawRows.find(row => row.some(cell => normalizeText(cell).toLowerCase() === 'jam'));
      const headerIndex = rawRows.indexOf(headerRow);
      if (!headerRow || headerIndex === -1) return [];
      const roomHeaders = headerRow.slice(1).map(v => normalizeText(v));
      const results = [];
      for (let i = headerIndex+1; i < rawRows.length; i++) {
        const jam = normalizeTime(rawRows[i][0]);
        if (!jam) continue;
        for (let j = 1; j < roomHeaders.length+1; j++) {
          const value = normalizeText(rawRows[i][j]);
          if (value) results.push({ hari: selectedDay, jam, ruang: roomHeaders[j-1], mataKuliah: value });
        }
      }
      return results;
    }

    function buildOccupiedMap(rows) {
      const map = new Map();
      rows.forEach(item => map.set(`${item.hari}|${item.jam}|${item.ruang}`, item.mataKuliah || 'Terisi'));
      return map;
    }

    function setStatus(message) {
      if (els.resultStatusBadge) els.resultStatusBadge.textContent = message;
    }

    function fillSelectOptions() {
      els.hari.innerHTML = '<option value="" disabled>Pilih hari...</option>' + DAYS.map(d => `<option value="${d}">${d}</option>`).join('');
      els.jam.innerHTML = '<option value="" disabled>Pilih jam...</option>' + TIME_SLOTS.map(s => `<option value="${s}">${s}</option>`).join('');
      els.ruang.innerHTML = '<option value="" disabled>Pilih ruang...</option>' + ROOMS.map(r => `<option value="${r}">${r}</option>`).join('');
    }

    function getNowInfo() {
      const now = new Date();
      const dayName = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][now.getDay()];
      const currentMinutes = now.getHours()*60 + now.getMinutes();
      const matchedSlot = TIME_SLOTS.find(slot => {
        const [start,end] = slot.split(' - ');
        const [sh,sm] = start.split('.').map(Number);
        const [eh,em] = end.split('.').map(Number);
        return currentMinutes >= sh*60+sm && currentMinutes < eh*60+em;
      });
      return { hari: DAYS.includes(dayName) ? dayName : 'Senin', jam: matchedSlot || TIME_SLOTS[0], hasActiveSlot: Boolean(matchedSlot) };
    }

    // ─── SLOT BADGE (e.g. "2PM") ───
    function slotToBadge(jam) {
      if (!jam) return '';
      const parts = jam.split(' - ');
      const start = parts[0] || '';
      const [h] = start.split('.').map(Number);
      if (isNaN(h)) return jam;
      const suffix = h >= 12 ? 'PM' : 'AM';
      const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
      return `${h12}${suffix}`;
    }

    function renderResults(items, emptyMessage) {
      if (!items.length) {
        els.resultList.innerHTML = `<div class="empty-state">${emptyMessage}</div>`;
        return;
      }
      els.resultList.innerHTML = items.map(item => `
        <div class="result-item">
          <div class="result-title">${item.title}</div>
          <span class="result-badge">${item.badge || ''}</span>
          <div class="result-detail">${item.detail}</div>
        </div>
      `).join('');
    }

    function updateModeUI() {
      const mode = els.mode.value;
      const isHariRuang = mode === 'hari-ruang';
      els.fieldRuang.classList.toggle('hidden', !isHariRuang);
      els.fieldJam.classList.toggle('hidden', isHariRuang);
      if (els.modeBadge) els.modeBadge.textContent = isHariRuang ? 'Mode: Hari dan Ruang' : 'Mode: Hari dan Jam';
      if (els.resultTitle) els.resultTitle.textContent = isHariRuang ? 'Jam Kosong' : 'Ruangan Tersedia';
    }

    function applyFilter() {
      const mode = els.mode.value;
      const hari = els.hari.value;
      if (!mode || !hari) return;

      if (mode === 'hari-ruang') {
        const ruang = els.ruang.value;
        if (!ruang) return;
        const jamKosong = [];
        TIME_SLOTS.forEach(jam => {
          if (!state.occupiedMap.get(`${hari}|${jam}|${ruang}`)) {
            jamKosong.push({ title: ruang, badge: slotToBadge(jam), detail: `Ruang ini kosong pada\n${hari}, ${jam}.` });
          }
        });
        renderResults(jamKosong, `Tidak ada jam kosong untuk ruang ${ruang} pada hari ${hari}.`);
      } else {
        const jam = els.jam.value;
        if (!jam) return;
        const ruangKosong = [];
        ROOMS.forEach(ruang => {
          if (!state.occupiedMap.get(`${hari}|${jam}|${ruang}`)) {
            ruangKosong.push({ title: ruang, badge: slotToBadge(jam), detail: `Ruang ini kosong pada\n${hari}, ${jam}.` });
          }
        });
        renderResults(ruangKosong, `Tidak ada ruangan kosong pada ${hari}, ${jam}.`);
      }
    }

    async function loadData() {
      setStatus('Memuat...');
      els.resultList.innerHTML = '<div class="empty-state loading">Mengambil data dari spreadsheet...</div>';
      try {
        const response = await fetch(CSV_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Gagal (${response.status})`);
        const text = await response.text();
        const rawRows = parseCSV(text);
        if (!rawRows.length) throw new Error('CSV kosong.');
        let rows = buildRowsFromNormalizedSheet(rawRows);
        if (!rows) rows = buildRowsFromWideSheet(rawRows);
        state.rows = rows;
        state.occupiedMap = buildOccupiedMap(rows);
        setStatus('Data dimuat ✓');
        applyFilter();
      } catch (error) {
        setStatus('Gagal memuat');
        els.resultList.innerHTML = `<div class="empty-state error">${error.message}</div>`;
      }
    }

    els.mode.addEventListener('change', () => { updateModeUI(); applyFilter(); });
    els.btnCek.addEventListener('click', applyFilter);
    els.btnRefresh.addEventListener('click', loadData);
    els.hari.addEventListener('change', applyFilter);
    els.ruang.addEventListener('change', applyFilter);
    els.jam.addEventListener('change', applyFilter);
    if (els.btnNow) {
      els.btnNow.addEventListener('click', () => {
        const nowInfo = getNowInfo();
        els.hari.value = nowInfo.hari;
        if (els.mode.value === 'hari-jam') els.jam.value = nowInfo.jam;
        applyFilter();
      });
    }

    fillSelectOptions();
    updateModeUI();
    const nowInfo = getNowInfo();
    els.hari.value = nowInfo.hari;
    els.jam.value = nowInfo.jam;
    renderCalendar();
    loadData();
  </script>
</body>
</html>
