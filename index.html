<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruang Kuliah - Ketersediaan Ruang Perkuliahan</title>
  <style>

    :root {
      --lime: #c9f23f;
      --green: #29c26b;
      --green-soft: rgba(62, 226, 111, .92);
      --white: #ffffff;
      --glass: rgba(235, 241, 236, 0.22);
      --glass-strong: rgba(255,255,255,0.28);
      --border: rgba(255,255,255,0.58);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.76);
      --danger: #ff6969;
      --yellow: #dff05f;
      --shadow: 0 22px 65px rgba(0,0,0,.35);
      --inner: inset 0 1px 0 rgba(255,255,255,.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 30px 18px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(23,35,27,.18), rgba(8,14,11,.50)),
        url("background.jpg") center center / cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.14), transparent 30%),
        linear-gradient(90deg, rgba(0,0,0,.13), transparent 18%, transparent 82%, rgba(0,0,0,.16));
      pointer-events: none;
      z-index: -1;
    }

    .app {
      width: min(100%, 470px);
      min-height: 720px;
      margin: 0 auto;
      padding: 42px 20px 34px;
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      background: rgba(235, 241, 236, .20);
      border: 2px solid var(--border);
      box-shadow: var(--shadow), var(--inner);
      backdrop-filter: blur(15px) saturate(120%);
      -webkit-backdrop-filter: blur(15px) saturate(120%);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, rgba(255,255,255,.30), rgba(255,255,255,.04) 46%, rgba(0,0,0,.10)),
        radial-gradient(circle at 50% 38%, rgba(255,255,255,.18), transparent 35%);
      pointer-events: none;
      z-index: 0;
    }

    .app > * {
      position: relative;
      z-index: 1;
    }

    .hero-art { display: none; }

    .header {
      display: block;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo { display: none; }

    .header h1 {
      margin: 0;
      color: #fff;
      font-size: 29px;
      line-height: 1.15;
      letter-spacing: .5px;
      text-transform: uppercase;
      font-weight: 950;
      text-shadow: 0 7px 12px rgba(0,0,0,.25);
    }

    .header p {
      margin: 8px 0 0;
      color: rgba(255,255,255,.78);
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 4px 12px rgba(0,0,0,.22);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin-bottom: 10px;
    }

    .icon-box { display: none; }

    .field label {
      display: block;
      margin: 0 0 8px;
      padding-left: 3px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 4px 10px rgba(0,0,0,.22);
    }

    select, input {
      width: 100%;
      min-height: 64px;
      padding: 0 22px;
      border-radius: 15px;
      border: 1.7px solid rgba(255,255,255,.70);
      outline: none;
      background: rgba(255,255,255,.13);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 11px 24px rgba(0,0,0,.12);
      backdrop-filter: blur(13px);
      -webkit-backdrop-filter: blur(13px);
      transition: .22s ease;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, white 50%),
        linear-gradient(135deg, white 50%, transparent 50%);
      background-position:
        calc(100% - 26px) 26px,
        calc(100% - 14px) 26px;
      background-size: 12px 12px, 12px 12px;
      background-repeat: no-repeat;
    }

    select option {
      color: #1c2b20;
      background: #fff;
      font-weight: 700;
    }

    select:focus, input:focus {
      border-color: #e9ff77;
      box-shadow: 0 0 0 4px rgba(207,242,63,.15), 0 12px 28px rgba(0,0,0,.15);
    }

    .calendar-box {
      margin-top: 18px;
      padding: 16px 13px 14px;
      border-radius: 18px;
      border: 1.4px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.10);
      box-shadow: 0 12px 28px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .calendar-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 20px;
      font-weight: 950;
      text-shadow: 0 5px 10px rgba(0,0,0,.25);
    }

    .calendar-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--lime), var(--green));
      box-shadow: 0 12px 24px rgba(57, 199, 108, .28);
    }

    .month-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-btn {
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 10px;
      background: rgba(255,255,255,.14);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: .2s;
    }

    .mini-btn:hover {
      background: rgba(255,255,255,.24);
      transform: translateY(-1px);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      text-align: center;
    }

    .dow {
      padding: 8px 0;
      color: rgba(255,255,255,.78);
      font-size: 12px;
      font-weight: 800;
      border-bottom: 1px solid rgba(255,255,255,.18);
    }

    .day {
      border: 0;
      border-radius: 12px;
      aspect-ratio: 1/0.82;
      background: transparent;
      color: rgba(255,255,255,.90);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }

    .day:hover {
      background: rgba(255,255,255,.16);
    }

    .day.other { color: rgba(255,255,255,.35); }
    .day.sunday { color: #ffd1d1; }
    .day.saturday { color: #e8ff8d; }

    .day.selected {
      color: #fff;
      background: linear-gradient(135deg, var(--lime), var(--green));
      font-weight: 950;
      box-shadow: 0 10px 20px rgba(57,199,108,.30);
    }

    .optional-note {
      margin-top: 10px;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.45;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .primary-btn, .secondary-btn {
      min-height: 58px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 950;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: .22s;
    }

    .primary-btn {
      border: 0;
      color: #fff;
      background: linear-gradient(90deg, var(--lime), var(--green));
      box-shadow: 0 15px 28px rgba(43, 190, 103, .32);
    }

    .secondary-btn {
      color: #fff;
      background: rgba(255,255,255,.12);
      border: 1.7px solid rgba(255,255,255,.56);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .primary-btn:hover, .secondary-btn:hover {
      transform: translateY(-2px);
    }

    .status-info {
      min-height: 20px;
      margin-top: 17px;
      color: rgba(255,255,255,.86);
      font-size: 13px;
      line-height: 1.45;
      text-shadow: 0 3px 8px rgba(0,0,0,.25);
    }

    .result-head {
      display: none;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin: 22px 0 14px;
      flex-direction: column;
    }

    .result-head.show { display: flex; }

    .result-head h2 {
      margin: 0;
      color: #fff;
      font-size: 19px;
      font-weight: 950;
      text-shadow: 0 5px 10px rgba(0,0,0,.25);
    }

    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.34);
      font-size: 12px;
      font-weight: 800;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .room-card {
      min-height: 90px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 15px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.30);
      box-shadow: 0 11px 24px rgba(0,0,0,.13), inset 0 1px 0 rgba(255,255,255,.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: .2s;
    }

    .room-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,.19);
    }

    .room-icon {
      flex: 0 0 54px;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.28);
    }

    .room-info { min-width: 0; flex: 1; }

    .room-info h3 {
      margin: 0 0 4px;
      color: #fff;
      font-size: 16px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(255,255,255,.88);
      font-size: 13px;
      margin-bottom: 3px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
      box-shadow: 0 0 0 2px rgba(255,255,255,.24);
    }

    .dot.green { background: var(--green); }
    .dot.red { background: var(--danger); }
    .dot.yellow { background: var(--yellow); }

    .room-time {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.4;
    }

    .source {
      margin-top: 6px;
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      color: #f2ff9e;
      background: rgba(201,242,63,.18);
      border: 1px solid rgba(201,242,63,.25);
      font-size: 10px;
      font-weight: 900;
    }

    .empty {
      display: none;
      margin-top: 14px;
      padding: 24px;
      text-align: center;
      color: rgba(255,255,255,.78);
      border-radius: 15px;
      background: rgba(255,255,255,.12);
      border: 1px dashed rgba(255,255,255,.38);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .empty.show { display: block; }

    .legend {
      margin-top: 22px;
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.26);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .legend-item {
      display: flex;
      gap: 10px;
      align-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
    }

    .legend-item span:last-child {
      display: block;
      color: rgba(255,255,255,.70);
      font-size: 12px;
      font-weight: 600;
      margin-top: 2px;
    }

    @media (min-width: 900px) {
      .app {
        width: min(100%, 760px);
      }

      .actions {
        grid-template-columns: 1fr 1fr;
      }

      .result-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      body { padding: 14px; }
      .app { padding: 34px 20px 28px; }
      .header h1 { font-size: 26px; }
      .calendar-head { align-items: stretch; flex-direction: column; }
      .month-actions { justify-content: space-between; }
      .mini-btn { flex: 1; }
    }

  </style>
</head>
<body>
  <main class="app">
    <div class="hero-art" aria-hidden="true">
      <svg viewBox="0 0 520 230" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="300" y="36" width="160" height="100" rx="10" fill="#ebe8ff" stroke="#8b7cf7" stroke-width="5"/>
        <path d="M298 60h-60v120h60V60Z" fill="#f4f2ff"/>
        <rect x="246" y="8" width="70" height="48" fill="#fff"/>
        <path d="M182 172c22-52 42-75 64-103 21 37 25 67 13 103h-77Z" fill="#a99cfb" opacity=".55"/>
        <rect x="201" y="164" width="76" height="14" rx="7" fill="#8b7cf7" opacity=".45"/>
        <path d="M367 142h50l18 48h-86l18-48Z" fill="#9487f4" opacity=".65"/>
        <rect x="384" y="135" width="48" height="44" rx="12" fill="#7768ed" opacity=".8"/>
        <rect x="390" y="185" width="10" height="36" rx="5" fill="#7c70e6"/>
        <rect x="430" y="185" width="10" height="36" rx="5" fill="#7c70e6"/>
        <path d="M55 215c88-30 133-24 190-2 62 24 144 20 224-7" stroke="#d9d5ff" stroke-width="18" stroke-linecap="round" opacity=".65"/>
      </svg>
    </div>

    <section class="header">
      <div class="logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 30.5 32 12l23 18.5" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 29v23h12V39h7v13h12V29" fill="currentColor" opacity=".35"/>
          <path d="M17 29v23h12V39h7v13h12V29" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
          <path d="m42 46 13 4-13 4-13-4 13-4Z" fill="currentColor"/>
          <path d="M55 50v8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Ruang Kuliah</h1>
        <p>Ketersediaan Ruang Perkuliahan</p>
      </div>
    </section>

    <section class="form-grid">
      <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.5"/></svg>
      </div>
      <div class="field">
        <label>Mode Pencarian</label>
        <select id="modeSearch">
          <option value="hari_jam">Berdasarkan Hari dan Jam</option>
          <option value="hari_ruang">Berdasarkan Hari dan Ruang</option>
        </select>
      </div>

      <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2.2"/><path d="M16 3v4M8 3v4M3 10h18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </div>
      <div class="field">
        <label>Hari</label>
        <select id="hariSelect">
          <option value="Senin">Senin</option>
          <option value="Selasa">Selasa</option>
          <option value="Rabu">Rabu</option>
          <option value="Kamis">Kamis</option>
          <option value="Jumat">Jumat</option>
          <option value="Sabtu">Sabtu</option>
        </select>
      </div>

      <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M4 21V5a2 2 0 0 1 2-2h8v18" stroke="currentColor" stroke-width="2.2"/><path d="M14 9h4a2 2 0 0 1 2 2v10" stroke="currentColor" stroke-width="2.2"/><path d="M8 7h2M8 11h2M8 15h2M17 13h1M17 17h1M3 21h19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </div>
      <div class="field" id="dynamicField">
        <label id="dynamicLabel">Jam</label>
        <select id="dynamicSelect"></select>
      </div>
    </section>

    <section class="calendar-box">
      <div class="calendar-head">
        <div class="calendar-title">
          <div class="calendar-icon">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2.2"/><path d="M16 3v4M8 3v4M3 10h18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </div>
          <span id="monthTitle">April 2026</span>
        </div>
        <div class="month-actions">
          <button class="mini-btn" id="prevMonth" type="button">‹</button>
          <button class="mini-btn" id="clearDate" type="button">Tanpa Tanggal</button>
          <button class="mini-btn" id="todayBtn" type="button">Hari ini</button>
          <button class="mini-btn" id="nextMonth" type="button">›</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="optional-note">Tanggal bersifat opsional. Jika tanggal tidak dipilih, aplikasi hanya membaca jadwal template mingguan.</div>
    </section>

    <section class="actions">
      <button class="primary-btn" id="showBtn" type="button">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.4"/></svg>
        Tampilkan Hasil
      </button>
      <button class="secondary-btn" id="reloadBtn" type="button">
        <svg width="27" height="27" viewBox="0 0 24 24" fill="none"><path d="M20 6v5h-5M4 18v-5h5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.1 9a7 7 0 0 1 11.6-2.6L20 8.5M3.9 15a7 7 0 0 0 11.6 2.6L13 15.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        Perbarui Data
      </button>
    </section>

    <div class="status-info" id="statusInfo">Memuat data CSV...</div>

    <section class="result-head" id="resultHead">
      <h2>Hasil Ketersediaan</h2>
      <div class="summary-pill" id="summaryPill">0 hasil</div>
    </section>

    <section class="result-grid" id="resultGrid"></section>
    <section class="empty" id="emptyState">Tidak ada data yang cocok dengan pencarian.</section>

  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsRN8TlhXI7CFnqgpgJTsaombzpwOKim3zMYDx00yyDDMefY82cuURulQcDO7QSQ/pub?output=csv";
    const LOCAL_CSV_URL = "./jadwal_template_khusus_rapi.csv";

    let jadwalData = [];
    let selectedDateISO = "";
    let currentMonth = new Date();

    const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const shortDayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
    const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    const el = (id) => document.getElementById(id);

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function normalizeTime(value) {
      const raw = normalizeText(value).replaceAll(".", ":");
      const match = raw.match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return raw;
      return `${match[1].padStart(2, "0")}:${match[2]}`;
    }

    function formatDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function toISODate(value) {
      const raw = normalizeText(value);
      if (!raw) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const parts = raw.split(/[\/\-]/).map(Number);
      if (parts.length === 3 && parts.every(n => !Number.isNaN(n))) {
        if (parts[0] > 1900) {
          return `${parts[0]}-${String(parts[1]).padStart(2, "0")}-${String(parts[2]).padStart(2, "0")}`;
        }
        const a = parts[0];
        const b = parts[1];
        const y = parts[2];
        if (a > 12) return `${y}-${String(b).padStart(2, "0")}-${String(a).padStart(2, "0")}`;
        return `${y}-${String(a).padStart(2, "0")}-${String(b).padStart(2, "0")}`;
      }
      const date = new Date(raw);
      if (!Number.isNaN(date.getTime())) return formatDateLocal(date);
      return raw;
    }

    function getHariFromTanggal(isoDate) {
      if (!isoDate) return "";
      const date = new Date(`${isoDate}T00:00:00`);
      return dayNames[date.getDay()] || "";
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }

      if (!rows.length) return [];
      const headers = rows[0].map((h) => normalizeText(h).toLowerCase());

      return rows.slice(1)
        .filter((r) => r.some((c) => normalizeText(c)))
        .map((r) => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = normalizeText(r[i]));

          return {
            tipe: normalizeText(obj.tipe).toLowerCase(),
            tanggal: toISODate(obj.tanggal),
            hari: normalizeText(obj.hari),
            ruang: normalizeText(obj.ruang),
            jam_mulai: normalizeTime(obj.jam_mulai),
            jam_selesai: normalizeTime(obj.jam_selesai),
            status: normalizeText(obj.status || "Kosong"),
            kode_mk: normalizeText(obj.kode_mk),
            kelas: normalizeText(obj.kelas),
            mata_kuliah: normalizeText(obj.mata_kuliah),
            nama_dosen: normalizeText(obj.nama_dosen),
            keterangan: normalizeText(obj.keterangan),
            tipe_perubahan: normalizeText(obj.tipe_perubahan || obj.perubahan || "normal").toLowerCase(),
          };
        });
    }

    async function loadCSV() {
      el("statusInfo").textContent = "Memuat data CSV...";
      try {
        let response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) {
          response = await fetch(LOCAL_CSV_URL, { cache: "no-store" });
        }
        if (!response.ok) throw new Error("CSV tidak dapat diakses");
        const text = await response.text();
        jadwalData = parseCSV(text);
        el("statusInfo").textContent = `Data berhasil dimuat: ${jadwalData.length} baris.`;
        populateDynamicOptions();
      } catch (error) {
        el("statusInfo").textContent = "Gagal memuat CSV. Pastikan file jadwal_template_khusus_rapi.csv berada satu folder dengan index.html atau link Google Sheet sudah dipublish.";
      }
    }

    function sameSlot(a, b) {
      return a.ruang === b.ruang && a.jam_mulai === b.jam_mulai && a.jam_selesai === b.jam_selesai;
    }

    function getSchedule(hari, dateISO) {
      const template = jadwalData.filter((d) => d.tipe === "template" && d.hari.toLowerCase() === hari.toLowerCase());
      if (!dateISO) return template.map((d) => ({ ...d, sumber: "template" }));

      const khusus = jadwalData.filter((d) => d.tipe === "khusus" && d.tanggal === dateISO);
      const overrideRows = khusus.filter((d) => ["override", "ubah", "ganti", "normal", ""].includes(d.tipe_perubahan));
      const tambahanRows = khusus.filter((d) => ["tambahan", "add", "baru"].includes(d.tipe_perubahan));
      const batalRows = khusus.filter((d) => ["libur", "hapus", "cancel", "batal"].includes(d.tipe_perubahan));

      const result = template.map((slot) => {
        const batal = batalRows.find((k) => sameSlot(k, slot));
        if (batal) {
          return { ...slot, status: "Tidak Tersedia", keterangan: batal.keterangan || "Jadwal dibatalkan", sumber: "khusus" };
        }

        const override = overrideRows.find((k) => sameSlot(k, slot));
        if (override) return { ...slot, ...override, hari, sumber: "khusus" };

        return { ...slot, sumber: "template" };
      });

      tambahanRows.forEach((row) => result.push({ ...row, hari, sumber: "khusus" }));
      return result;
    }

    function getKeterangan(item) {
      const detail = [];
      if (item.kode_mk) detail.push(item.kode_mk + (item.kelas ? ` (${item.kelas})` : ""));
      if (item.mata_kuliah) detail.push(item.mata_kuliah);
      if (item.nama_dosen) detail.push(`Dosen: ${item.nama_dosen}`);
      if (item.keterangan) detail.push(item.keterangan);
      return detail.join(" • ");
    }

    function populateDynamicOptions() {
      const mode = el("modeSearch").value;
      const select = el("dynamicSelect");
      select.innerHTML = "";

      if (mode === "hari_jam") {
        el("dynamicLabel").textContent = "Jam";
        const times = [...new Set(jadwalData.filter(d => d.tipe === "template").map(d => `${d.jam_mulai} - ${d.jam_selesai}`).filter(Boolean))].sort();
        times.forEach((time) => {
          const opt = document.createElement("option");
          opt.value = time;
          opt.textContent = time;
          select.appendChild(opt);
        });
      } else {
        el("dynamicLabel").textContent = "Ruang";
        const rooms = [...new Set(jadwalData.map(d => d.ruang).filter(Boolean))].sort();
        rooms.forEach((room) => {
          const opt = document.createElement("option");
          opt.value = room;
          opt.textContent = room;
          select.appendChild(opt);
        });
      }
    }

    function statusClass(status) {
      const s = status.toLowerCase();
      if (s === "kosong") return "green";
      if (s === "terpakai" || s === "tidak tersedia") return "red";
      return "yellow";
    }

    function renderResults() {
      const mode = el("modeSearch").value;
      let hari = el("hariSelect").value;
      const filterValue = el("dynamicSelect").value;

      if (selectedDateISO) {
        hari = getHariFromTanggal(selectedDateISO);
        el("hariSelect").value = hari;
      }

      let rows = getSchedule(hari, selectedDateISO);

      if (mode === "hari_jam") {
        rows = rows.filter((r) => `${r.jam_mulai} - ${r.jam_selesai}` === filterValue);
      } else {
        rows = rows.filter((r) => r.ruang === filterValue);
      }

      rows = rows.sort((a, b) => a.jam_mulai.localeCompare(b.jam_mulai) || a.ruang.localeCompare(b.ruang));

      const grid = el("resultGrid");
      grid.innerHTML = "";

      rows.forEach((item) => {
        const detail = getKeterangan(item);
        const cls = statusClass(item.status);
        const card = document.createElement("article");
        card.className = "room-card";
        card.innerHTML = `
          <div class="room-icon">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M4 21V5a2 2 0 0 1 2-2h8v18" stroke="currentColor" stroke-width="2.2"/><path d="M14 9h4a2 2 0 0 1 2 2v10" stroke="currentColor" stroke-width="2.2"/><path d="M8 7h2M8 11h2M8 15h2M17 13h1M17 17h1M3 21h19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </div>
          <div class="room-info">
            <h3>${item.ruang || "-"}</h3>
            <div class="status-line"><span class="dot ${cls}"></span>${item.status || "-"}</div>
            <div class="room-time">${hari}, ${item.jam_mulai} - ${item.jam_selesai}</div>
            ${detail ? `<div class="room-time">${detail}</div>` : ""}
            ${item.sumber === "khusus" ? `<span class="source">Jadwal Khusus</span>` : ""}
          </div>
        `;
        grid.appendChild(card);
      });

      el("resultHead").classList.add("show");
      const kosong = rows.filter(r => r.status.toLowerCase() === "kosong").length;
      const khusus = rows.filter(r => r.sumber === "khusus").length;
      el("summaryPill").textContent = `${rows.length} hasil • ${kosong} kosong • ${khusus} khusus`;
      el("emptyState").classList.toggle("show", rows.length === 0);
    }

    function renderCalendar() {
      const grid = el("calendarGrid");
      grid.innerHTML = "";
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      el("monthTitle").textContent = `${monthNames[month]} ${year}`;

      shortDayNames.forEach((d, i) => {
        const div = document.createElement("div");
        div.className = "dow";
        div.textContent = d;
        if (i === 0) div.style.color = "var(--red)";
        if (i === 6) div.style.color = "#3e4dff";
        grid.appendChild(div);
      });

      const first = new Date(year, month, 1);
      const start = new Date(year, month, 1 - first.getDay());

      for (let i = 0; i < 42; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const iso = formatDateLocal(date);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "day";
        if (date.getMonth() !== month) btn.classList.add("other");
        if (date.getDay() === 0) btn.classList.add("sunday");
        if (date.getDay() === 6) btn.classList.add("saturday");
        if (selectedDateISO === iso) btn.classList.add("selected");
        btn.textContent = date.getDate();
        btn.addEventListener("click", () => {
          selectedDateISO = iso;
          el("hariSelect").value = getHariFromTanggal(selectedDateISO);
          renderCalendar();
        });
        grid.appendChild(btn);
      }
    }

    function setToday() {
      const today = new Date();
      currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      selectedDateISO = formatDateLocal(today);
      el("hariSelect").value = getHariFromTanggal(selectedDateISO);
      renderCalendar();
    }

    el("modeSearch").addEventListener("change", populateDynamicOptions);
    el("showBtn").addEventListener("click", renderResults);
    el("reloadBtn").addEventListener("click", loadCSV);
    el("prevMonth").addEventListener("click", () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
      renderCalendar();
    });
    el("nextMonth").addEventListener("click", () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
      renderCalendar();
    });
    el("todayBtn").addEventListener("click", setToday);
    el("clearDate").addEventListener("click", () => {
      selectedDateISO = "";
      renderCalendar();
    });

    renderCalendar();
    loadCSV();
  </script>
</body>
</html>
