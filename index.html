nter / cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.14), transparent 30%),
        linear-gradient(90deg, rgba(0,0,0,.13), transparent 18%, transparent 82%, rgba(0,0,0,.16));
      pointer-events: none;
      z-index: -1;
    }

    .app {
      width: min(100%, 470px);
      min-height: 720px;
      margin: 0 auto;
      padding: 42px 20px 34px;
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      background: rgba(235, 241, 236, .20);
      border: 2px solid var(--border);
      box-shadow: var(--shadow), var(--inner);
      backdrop-filter: blur(15px) saturate(120%);
      -webkit-backdrop-filter: blur(15px) saturate(120%);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, rgba(255,255,255,.30), rgba(255,255,255,.04) 46%, rgba(0,0,0,.10)),
        radial-gradient(circle at 50% 38%, rgba(255,255,255,.18), transparent 35%);
      pointer-events: none;
      z-index: 0;
    }

    .app > * {
      position: relative;
      z-index: 1;
    }

    .hero-art { display: none; }

    .header {
      display: block;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo { display: none; }

    .header h1 {
      margin: 0;
      color: #fff;
      font-size: 29px;
      line-height: 1.15;
      letter-spacing: .5px;
      text-transform: uppercase;
      font-weight: 950;
      text-shadow: 0 7px 12px rgba(0,0,0,.25);
    }

    .header p {
      margin: 8px 0 0;
      color: rgba(255,255,255,.78);
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 4px 12px rgba(0,0,0,.22);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin-bottom: 10px;
    }

    .icon-box { display: none; }

    .field label {
      display: block;
      margin: 0 0 8px;
      padding-left: 3px;

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsRN8TlhXI7CFnqgpgJTsaombzpwOKim3zMYDx00yyDDMefY82cuURulQcDO7QSQ/pub?output=csv";
    const LOCAL_CSV_URL = "./jadwal_template_khusus_rapi.csv";

    let jadwalData = [];
    let selectedDateISO = "";
    let currentMonth = new Date();

    const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const shortDayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
    const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    const el = (id) => document.getElementById(id);

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function normalizeTime(value) {
      const raw = normalizeText(value).replaceAll(".", ":");
      const match = raw.match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return raw;
      return `${match[1].padStart(2, "0")}:${match[2]}`;
    }

    function formatDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function toISODate(value) {
      const raw = normalizeText(value);
      if (!raw) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const parts = raw.split(/[\/\-]/).map(Number);
      if (parts.length === 3 && parts.every(n => !Number.isNaN(n))) {
        if (parts[0] > 1900) {
          return `${parts[0]}-${String(parts[1]).padStart(2, "0")}-${String(parts[2]).padStart(2, "0")}`;
        }
        const a = parts[0];
        const b = parts[1];
        const y = parts[2];
        if (a > 12) return `${y}-${String(b).padStart(2, "0")}-${String(a).padStart(2, "0")}`;
        return `${y}-${String(a).padStart(2, "0")}-${String(b).padStart(2, "0")}`;
      }
      const date = new Date(raw);
      if (!Number.isNaN(date.getTime())) return formatDateLocal(date);
      return raw;
    }

    function getHariFromTanggal(isoDate) {
      if (!isoDate) return "";
      const date = new Date(`${isoDate}T00:00:00`);
      return dayNames[date.getDay()] || "";
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }

      if (!rows.length) return [];
      const headers = rows[0].map((h) => normalizeText(h).toLowerCase());

      return rows.slice(1)
        .filter((r) => r.some((c) => normalizeText(c)))
        .map((r) => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = normalizeText(r[i]));

          return {
            tipe: normalizeText(obj.tipe).toLowerCase(),
            tanggal: toISODate(obj.tanggal),
            hari: normalizeText(obj.hari),
            ruang: normalizeText(obj.ruang),
            jam_mulai: normalizeTime(obj.jam_mulai),
            jam_selesai: normalizeTime(obj.jam_selesai),
            status: normalizeText(obj.status || "Kosong"),
            kode_mk: normalizeText(obj.kode_mk),
            kelas: normalizeText(obj.kelas),
            mata_kuliah: normalizeText(obj.mata_kuliah),
            nama_dosen: normalizeText(obj.nama_dosen),
            keterangan: normalizeText(obj.keterangan),
            tipe_perubahan: normalizeText(obj.tipe_perubahan || obj.perubahan || "normal").toLowerCase(),
          };
        });
    }

    async function loadCSV() {
      el("statusInfo").textContent = "Memuat data CSV...";
      try {
        let response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) {
          response = await fetch(LOCAL_CSV_URL, { cache: "no-store" });
        }
        if (!response.ok) throw new Error("CSV tidak dapat diakses");
        const text = await response.text();
        jadwalData = parseCSV(text);
        el("statusInfo").textContent = `Data berhasil dimuat: ${jadwalData.length} baris.`;
        populateDynamicOptions();
      } catch (error) {
        el("statusInfo").textContent = "Gagal memuat CSV. Pastikan file jadwal_template_khusus_rapi.csv berada satu folder dengan index.html atau link Google Sheet sudah dipublish.";
      }
    }

    function sameSlot(a, b) {
      return a.ruang === b.ruang && a.jam_mulai === b.jam_mulai && a.jam_selesai === b.jam_selesai;
    }

    function getSchedule(hari, dateISO) {
      const template = jadwalData.filter((d) => d.tipe === "template" && d.hari.toLowerCase() === hari.toLowerCase());
      if (!dateISO) return template.map((d) => ({ ...d, sumber: "template" }));

      const khusus = jadwalData.filter((d) => d.tipe === "khusus" && d.tanggal === dateISO);
      const overrideRows = khusus.filter((d) => ["override", "ubah", "ganti", "normal", ""].includes(d.tipe_perubahan));
      const tambahanRows = khusus.filter((d) => ["tambahan", "add", "baru"].includes(d.tipe_perubahan));
      const batalRows = khusus.filter((d) => ["libur", "hapus", "cancel", "batal"].includes(d.tipe_perubahan));

      const result = template.map((slot) => {
        const batal = batalRows.find((k) => sameSlot(k, slot));
        if (batal) {
          return { ...slot, status: "Tidak Tersedia", keterangan: batal.keterangan || "Jadwal dibatalkan", sumber: "khusus" };
        }

        const override = overrideRows.find((k) => sameSlot(k, slot));
        if (override) return { ...slot, ...override, hari, sumber: "khusus" };

        return { ...slot, sumber: "template" };
      });

      tambahanRows.forEach((row) => result.push({ ...row, hari, sumber: "khusus" }));
      return result;
    }

    function getKeterangan(item) {
      const detail = [];
      if (item.kode_mk) detail.push(item.kode_mk + (item.kelas ? ` (${item.kelas})` : ""));
      if (item.mata_kuliah) detail.push(item.mata_kuliah);
      if (item.nama_dosen) detail.push(`Dosen: ${item.nama_dosen}`);
      if (item.keterangan) detail.push(item.keterangan);
      return detail.join(" • ");
    }

    function populateDynamicOptions() {
      const mode = el("modeSearch").value;
      const select = el("dynamicSelect");
      select.innerHTML = "";

      if (mode === "hari_jam") {
        el("dynamicLabel").textContent = "Jam";
        const times = [...new Set(jadwalData.filter(d => d.tipe === "template").map(d => `${d.jam_mulai} - ${d.jam_selesai}`).filter(Boolean))].sort();
        times.forEach((time) => {
          const opt = document.createElement("option");
          opt.value = time;
          opt.textContent = time;
          select.appendChild(opt);
        });
      } else {
        el("dynamicLabel").textContent = "Ruang";
        const rooms = [...new Set(jadwalData.map(d => d.ruang).filter(Boolean))].sort();
        rooms.forEach((room) => {
          const opt = document.createElement("option");
          opt.value = room;
          opt.textContent = room;
          select.appendChild(opt);
        });
      }
    }

    function statusClass(status) {
      const s = status.toLowerCase();
      if (s === "kosong") return "green";
      if (s === "terpakai" || s === "tidak tersedia") return "red";
      return "yellow";
    }

    function renderResults() {
      const mode = el("modeSearch").value;
      let hari = el("hariSelect").value;
      const filterValue = el("dynamicSelect").value;

      if (selectedDateISO) {
        hari = getHariFromTanggal(selectedDateISO);
        el("hariSelect").value = hari;
      }

      let rows = getSchedule(hari, selectedDateISO);

      if (mode === "hari_jam") {
        rows = rows.filter((r) => `${r.jam_mulai} - ${r.jam_selesai}` === filterValue);
      } else {
        rows = rows.filter((r) => r.ruang === filterValue);
      }

      rows = rows.sort((a, b) => a.jam_mulai.localeCompare(b.jam_mulai) || a.ruang.localeCompare(b.ruang));

      const grid = el("resultGrid");
      grid.innerHTML = "";

      rows.forEach((item) => {
        const detail = getKeterangan(item);
        const cls = statusClass(item.status);
        const card = document.createElement("article");
        card.className = "room-card";
        card.innerHTML = `
          <div class="room-icon">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M4 21V5a2 2 0 0 1 2-2h8v18" stroke="currentColor" stroke-width="2.2"/><path d="M14 9h4a2 2 0 0 1 2 2v10" stroke="currentColor" stroke-width="2.2"/><path d="M8 7h2M8 11h2M8 15h2M17 13h1M17 17h1M3 21h19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </div>
          <div class="room-info">
            <h3>${item.ruang || "-"}</h3>
            <div class="status-line"><span class="dot ${cls}"></span>${item.status || "-"}</div>
            <div class="room-time">${hari}, ${item.jam_mulai} - ${item.jam_selesai}</div>
            ${detail ? `<div class="room-time">${detail}</div>` : ""}
            ${item.sumber === "khusus" ? `<span class="source">Jadwal Khusus</span>` : ""}
          </div>
        `;
        grid.appendChild(card);
      });

      el("resultHead").classList.add("show");
      const kosong = rows.filter(r => r.status.toLowerCase() === "kosong").length;
      const khusus = rows.filter(r => r.sumber === "khusus").length;
      el("summaryPill").textContent = `${rows.length} hasil • ${kosong} kosong • ${khusus} khusus`;
      el("emptyState").classList.toggle("show", rows.length === 0);
    }

    function renderCalendar() {
      const grid = el("calendarGrid");
      grid.innerHTML = "";
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      el("monthTitle").textContent = `${monthNames[month]} ${year}`;

      shortDayNames.forEach((d, i) => {
        const div = document.createElement("div");
        div.className = "dow";
        div.textContent = d;
        if (i === 0) div.style.color = "var(--red)";
        if (i === 6) div.style.color = "#3e4dff";
        grid.appendChild(div);
      });

      const first = new Date(year, month, 1);
      const start = new Date(year, month, 1 - first.getDay());

      for (let i = 0; i < 42; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const iso = formatDateLocal(date);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "day";
        if (date.getMonth() !== month) btn.classList.add("other");
        if (date.getDay() === 0) btn.classList.add("sunday");
        if (date.getDay() === 6) btn.classList.add("saturday");
        if (selectedDateISO === iso) btn.classList.add("selected");
        btn.textContent = date.getDate();
        btn.addEventListener("click", () => {
          selectedDateISO = iso;
          el("hariSelect").value = getHariFromTanggal(selectedDateISO);
          renderCalendar();
        });
        grid.appendChild(btn);
      }
    }

    function setToday() {
      const today = new Date();
      currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      selectedDateISO = formatDateLocal(today);
      el("hariSelect").value = getHariFromTanggal(selectedDateISO);
      renderCalendar();
    }

    el("modeSearch").addEventListener("change", populateDynamicOptions);
    el("showBtn").addEventListener("click", renderResults);
    el("reloadBtn").addEventListener("click", loadCSV);
    el("prevMonth").addEventListener("click", () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
      renderCalendar();
    });
    el("nextMonth").addEventListener("click", () => {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
      renderCalendar();
    });
    el("todayBtn").addEventListener("click", setToday);
    el("clearDate").addEventListener("click", () => {
      selectedDateISO = "";
      renderCalendar();
    });

    renderCalendar();
    loadCSV();
  </script>
</body>
